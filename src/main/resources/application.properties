spring.application.name=tato-almacen-backend

# ===== Base de datos (misma BD que el sistema web de gestion) =====
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:motorepuestos_tato}?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ===== JWT =====
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===== Uploads =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Gemini =====
gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-3.1-flash-lite}

# ===== Cloudinary =====
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# ===== Firebase =====
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

# ===== Puerto =====
server.port=${PORT:8080}

# ===== Clave interna servidor-a-servidor =====
internal.api.key=${INTERNAL_API_KEY}
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON:}